version: '3.8'

services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: documind-rag
    ports:
      - "8000:8000"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - TRANSFORMERS_OFFLINE=1
      - HF_DATASETS_OFFLINE=1
      - PYTHONUNBUFFERED=1
    volumes:
      - ./vector_store:/app/vector_store
      - ./docs:/app/docs
      - ./config:/app/config
      - ./pdf_ragpromax.py:/app/pdf_ragpromax.py
      - ./config.json:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G